<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENTOS CAT</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">INICIO</a></li>
                <li><a href="galeria.html">GALERIA</a></li>
                <li><a href="RRSS.html">REDES SOCIALES</a></li>
            </ul>
        </nav>
    </header>

    <!-- Barra de eventos fijos -->
    <section class="fixed-events">
        <h2>EVENTOS MENSUALES</h2>
        <div class="fixed-events-container">
            <a href="montjuic.html">
                <img src="GALERIA/montjuic.jfif" alt="XX Retro Clàssic" class="event-logo">
            </a>
            <a href="viladecans.html">
                <img src="GALERIA/viladecans.png" alt="10a TROBADA BEGUES" class="event-logo">
            </a>
            <a href="maresme.html">
                <img src="GALERIA/maresme.png" alt="COPA TIBIDABO" class="event-logo">
            </a>
        </div>
    </section>

    <main>
        <div class="content">
            <!-- Sección de evento cercano -->
            <div class="highlighted-event">
                <h2><em>EVENTO CERCANO</em></h2>
                <a href="KDDS/tibidabo.html">
                    <img src="POSTERS/tibidabo.jfif" alt="Póster de Evento" class="event-poster">
                </a>
            </div>

            <!-- Sección de calendario -->
            <div class="calendar">
                <h2>CALENDARIO</h2>
                <div id="calendar"></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                firstDay: 1,
                events: [

                    { title: 'COPA TIBIDABO', date: '2024-11-09', url: 'KDDS/tibidabo.html' },
                    { title: 'CASTELLDEFELS', date: '2024-11-10', url: 'KDDS/castelldefels.html' },
                    { title: 'MAÇANET DE CABRENYS', date: '2024-11-10', url: 'KDDS/maçanet.html' },
                    { title: 'MOTOR CLASSIC', date: '2024-11-24', url: 'KDDS/motorclassic.html' },
                    { title: "CL'HÀSSICS", date: '2024-11-10', url: 'KDDS/hospitalet.html' },
                    { title: "RALLYE GIRONA", date: '2024-11-23', url: 'KDDS/girona.html' },
                    { title: "CERVELLÓ CLÀSSICS", date: '2024-11-23', url: 'KDDS/cervello.html' },
                    { title: "ST BARTOMEU", date: '2024-11-17', url: 'KDDS/bartomeu.html' },
                    { title: "SEAT NACIONAL", date: '2024-11-09', url: 'KDDS/seatnacional.html' },
                    { title: "SABADELL", date: '2024-11-23', url: 'KDDS/sabadell.html' },
                    { title: "SABADELL", date: '2024-11-24', url: 'KDDS/sabadell.html' },
                    { title: "SANT LLORENÇ", date: '2024-11-24', url: 'KDDS/stllorenç.html' },
                ],
                eventClick: function(info) {
                    window.location.href = info.event.url;
                },
                eventDidMount: function(info) {
                    info.el.style.fontSize = '0.8em';
                    info.el.style.overflow = 'hidden';
                    info.el.style.whiteSpace = 'nowrap';
                    info.el.style.textOverflow = 'ellipsis';
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
